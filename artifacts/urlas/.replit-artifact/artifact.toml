kind = "web"
previewPath = "/"
title = "Urla's Coffee Shop"
version = "1.0.0"
id = "artifacts/urlas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24199

[services.development]
run = "pnpm --filter @workspace/urlas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/urlas", "run", "build" ]
publicDir = "artifacts/urlas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24199"
BASE_PATH = "/"
